services:
  postgres:
    image: postgres:16-alpine
    container_name: wan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wan_videos}
      POSTGRES_USER: ${POSTGRES_USER:-wan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - wan-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wan_user} -d ${POSTGRES_DB:-wan_videos}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: wan-backend
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/${POSTGRES_DB:-wan_videos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-wan_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      FAL_API_KEY: ${FAL_API_KEY}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      wan-offline:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  wan-offline:
    build:
      context: ./backend-wan
      dockerfile: Dockerfile
      network: host
    container_name: wan-offline
    restart: unless-stopped
    network_mode: "host"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8088"]
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8088/health | grep -q offline_engine_running || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: wan-frontend
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      backend:
        condition: service_healthy

networks:
  wan-network:
    driver: bridge

volumes:
  postgres_data:
